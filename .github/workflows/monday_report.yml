name: Monday Financial Report

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering

# on:
#   schedule:
#     # Runs every Monday at 07:00 UTC (08:00 Paris Time)
#     - cron: '0 7 * * 1'
#   workflow_dispatch:  # Allows manual triggering

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      # Tes secrets sont parfaitement configurés ici
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Cette étape installe AUTOMATIQUEMENT tes packages grâce à renv.lock
      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev ca-certificates
      
      # # Try to fix curl segfault in GA
      # - name: Reinstall R curl
      #   run: |
      #     Rscript -e 'install.packages(c("curl","openssl","emayili"), type="source")'

# --- AJOUTER CE BLOC POUR CORRIGER LE SEGFAULT ---
      - name: Reinstall curl from source (Fix Segfault)
        run: |
          # On force la réinstallation de curl en le compilant sur la machine
          # Cela garantit la compatibilité avec OpenSSL et évite le crash
          Rscript -e 'install.packages("curl", type = "source", repos = "https://cloud.r-project.org")'

      - name: Run Monday Analysis
        run: |
          Rscript main.R