name: Monday Financial Report

on:
  schedule:
    # Runs every Monday at 07:00 UTC (08:00 Paris Time)
    - cron: '0 7 * * 1'
  workflow_dispatch:  # Allows manual triggering

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      # Tes secrets sont parfaitement configurés ici
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Cette étape installe AUTOMATIQUEMENT tes packages grâce à renv.lock
      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      # J'ai supprimé les étapes "Install R packages" et "Restore renv"
      # car setup-renv (au-dessus) l'a déjà fait.

      - name: Run Monday Analysis
        run: |
          Rscript monday_agent.R