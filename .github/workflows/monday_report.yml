name: Monday Financial Report

on:
  push:
    branches: [main]
  schedule:
    # Lundi 08:00 UTC = 09:00 CET (oct–mars) / 10:00 CEST (mars–oct)
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Déclenchement manuel possible

jobs:
  generate-report:
    runs-on: ubuntu-22.04
    # runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Tes secrets sont parfaitement configurés ici
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      # Chrome path for chromote/webshot2 (gtsave)
      CHROMOTE_CHROME: /usr/bin/google-chrome-stable
      # Opt into Node.js 24 now (Node.js 20 actions deprecated, forced June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Cette étape installe AUTOMATIQUEMENT tes packages grâce à renv.lock
      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install system dependencies and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev ca-certificates \
            fonts-liberation fonts-lato fonts-noto-core fonts-dejavu-core
          # Pre-build font cache so Chrome/chromote doesn't trigger mtime warnings
          sudo fc-cache -f

      - name: Install Chrome (needed by chromote/gtsave)
        run: |
          wget -q -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/google-chrome.deb
      
      # # Try to fix curl segfault in GA
      # - name: Reinstall R curl
      #   run: |
      #     Rscript -e 'install.packages(c("curl","openssl","emayili"), type="source")'

# --- AJOUTER CE BLOC POUR CORRIGER LE SEGFAULT ---
      - name: Reinstall curl from source (Fix Segfault)
        run: |
          # On force la réinstallation de curl en le compilant sur la machine
          # Cela garantit la compatibilité avec OpenSSL et évite le crash
          Rscript -e 'renv::install("curl", rebuild = TRUE, type = "source", repos = "https://cloud.r-project.org")'

      - name: Run Monday Analysis
        run: |
          Rscript main.R

      - name: Archive PDF to examples/
        run: |
          WEEK=$(date -d "last monday" +"%Y_W%V")
          DEST="examples/rapport_${WEEK}.pdf"
          if [ -f financial_report.pdf ]; then
            cp financial_report.pdf "$DEST"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$DEST"
            git diff --cached --quiet || git commit -m "chore: add weekly report ${WEEK}"
            git push
          else
            echo "No PDF found, skipping archive."
          fi